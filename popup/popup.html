<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LOK extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">LOK</div>
    <div class="subtitle">extension</div>
  </header>

  <div id="url-bar">
    <span id="url-display">Ouvrez une vidéo YouTube</span>
  </div>

  <!-- Progression -->
  <section class="section" id="section-progress">
    <div class="section-title">Téléchargement en cours</div>
    <div id="progress-phase">--</div>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-meta">
      <span id="progress-pct">0%</span>
      <span id="progress-speed"></span>
      <span id="progress-eta"></span>
    </div>
  </section>

  <!-- Clip -->
  <section class="section">
    <div class="section-title">Clip</div>
    <div class="clip-row">
      <button class="btn btn-sm" id="btn-set-start">▶ Début</button>
      <span id="clip-times">--:-- → --:--</span>
      <button class="btn btn-sm" id="btn-set-end">⏹ Fin</button>
    </div>
    <div class="btn-group">
      <button class="btn" id="btn-dl-clip">⬇ Télécharger clip</button>
      <button class="btn" id="btn-copy-clip">📋 Copier URL clip</button>
    </div>
  </section>

  <!-- Vidéo complète -->
  <section class="section">
    <div class="section-title">Vidéo complète</div>
    <div class="btn-group">
      <button class="btn btn-accent" id="btn-dl-full">⬇ Télécharger vidéo</button>
      <button class="btn" id="btn-copy-full">📋 Copier URL</button>
    </div>
  </section>

  <!-- Paramètres -->
  <section class="section">
    <div class="section-title">Téléchargements parallèles</div>
    <div class="n-row">
      <button class="btn btn-sm" id="btn-n-minus">−</button>
      <div id="n-display">
        <span id="n-value">4</span>
        <span id="n-label">connexions</span>
      </div>
      <button class="btn btn-sm" id="btn-n-plus">+</button>
    </div>
    <div id="n-hint"></div>
  </section>

  <div id="status-bar"></div>

  <script src="popup.js"></script>
</body>
</html>
